# Zaffr todo app - run with: docker compose up
# App: http://localhost:3000
# Health: http://localhost:3000/api/health

services:
  zaffr:
    build:
      context: ./zaffr
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/db.sqlite"
    volumes:
      - zaffr-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  zaffr-data:
